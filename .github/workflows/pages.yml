name: Deploy playable to GitHub Pages

# Publishes the single-file playable to a live URL on every push to main:
#   https://dkauzi.github.io/parrot-runner/
# NOTE: GitHub Pages serves publicly. For a PRIVATE repo you need GitHub Pro/Team to publish,
# or make the repo public. Enable once under Settings -> Pages -> Source: GitHub Actions.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:pages
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
